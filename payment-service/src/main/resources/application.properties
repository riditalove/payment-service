spring.application.name=payment

# If 8080 is already in use: stop the other process, or run with
#   mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=8082"
# and set encryption.service.base-url (and processor-service payment.client.base-url) to that port when calling this app.
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/payment
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# AES-GCM key material (SHA-256 hashed to 256-bit AES key). Use a strong secret in production.
payment.encryption.secret=change-me-use-a-long-random-secret-in-production

# HTTP encryption client (POST {baseUrl}/encrypt). Defaults to this process; override for a separate encrypt service.
encryption.service.base-url=http://localhost:${server.port}
encryption.service.connect-timeout-ms=5000
encryption.service.read-timeout-ms=10000

# Auth service HTTP client (POST {baseUrl}/auth/validate) for Bearer token validation.
auth.service.base-url=http://localhost:8083
auth.service.connect-timeout-ms=5000
auth.service.read-timeout-ms=10000

# RabbitMQ (exchange payments.exchange, queue payments.queue, routing key payments.created)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5678
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest